<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eve Manajemen</title>
    <meta name="description" content="Manage your Eve Manajemen products gracefully">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }
        .modal-content {
            width: 90%;
            max-width: 400px;
            margin: 10% auto;
            background: #fff;
            padding: 2rem;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .close-btn {
            position: absolute;
            right: 1.5rem;
            top: 1.5rem;
            font-size: 1.5rem;
            font-weight: bold;
            color: #666;
            cursor: pointer;
        }
        .close-btn:hover { color: #000; }
        .edit-fields .input-group { margin-bottom: 1rem; width: 100%; }
        .edit-fields input, .edit-fields select { width: 100%; box-sizing: border-box; }
    </style>
</head>

<body>
    <div class="container">
        <header class="header">
            <h1>Eve Manajemen</h1>
            <p class="subtitle">Efficiently manage your product inventory</p>
        </header>

        <section class="card">
            <div class="card-title">
                <h2>Add New Product</h2>
            </div>
            <div class="form-row">
                <div class="input-group">
                    <label for="name">Product Name</label>
                    <input type="text" id="name" placeholder="e.g. Wireless Mouse">
                </div>
                <div class="input-group">
                    <label for="category">Category</label>
                    <input type="text" id="category" placeholder="e.g. Electronics">
                </div>
                <div class="input-group">
                    <label for="available">Availability Status</label>
                    <select id="available">
                        <option value="true">Available</option>
                        <option value="false">Out of Stock</option>
                    </select>
                </div>
                <button class="btn-primary" onclick="addProduct()">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                    </svg>
                    Add Product
                </button>
            </div>
        </section>

        <section class="card">
            <div class="card-title">
                <h2>Product Roster</h2>
            </div>
            <div class="form-row" style="margin-bottom: 1rem; background: #f9fafb; padding: 1rem; border-radius: 8px;">
                <div class="input-group">
                    <label for="search-name">Name</label>
                    <input type="text" id="search-name" placeholder="Search by name...">
                </div>
                <div class="input-group">
                    <label for="search-category">Category</label>
                    <select id="search-category">
                        <option value="">All Categories</option>
                        <option value="Writing">Writing</option>
                        <option value="Paper">Paper</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Accessories">Accessories</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="search-available">Availability</label>
                    <select id="search-available">
                        <option value="">Any</option>
                        <option value="true">Available</option>
                        <option value="false">Out of Stock</option>
                    </select>
                </div>
                <button class="btn-primary" onclick="loadProducts()" id="search-btn">
                    Search
                </button>
                <button class="btn-primary" style="background: #6b7280;" onclick="clearSearch()" id="clear-btn">
                    Clear
                </button>
            </div>

            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Product Name</th>
                            <th>Category</th>
                            <th>Status</th>
                            <th style="text-align: center;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="productTable">
                        <!-- Populated dynamically via JS -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 style="margin-top:0; margin-bottom:1.5rem; color:#1f2937;">Edit Product</h2>
            <div class="edit-fields">
                <input type="hidden" id="edit-id">
                <div class="input-group">
                    <label for="edit-name">Product Name</label>
                    <input type="text" id="edit-name">
                </div>
                <div class="input-group">
                    <label for="edit-category">Category</label>
                    <input type="text" id="edit-category">
                </div>
                <div class="input-group">
                    <label for="edit-available">Availability Status</label>
                    <select id="edit-available">
                        <option value="true">Available</option>
                        <option value="false">Out of Stock</option>
                    </select>
                </div>
                <button class="btn-primary" onclick="saveEdit()" style="background: #eab308; width:100%; justify-content:center; margin-top: 1rem;">
                    Simpan Perubahan
                </button>
            </div>
        </div>
    </div>

    <!-- PENTING: pastikan file ini ada -->
    <script src="script.js"></script>
</body>
</html>
